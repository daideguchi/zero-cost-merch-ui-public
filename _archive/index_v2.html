<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>0円仕入れ物販 — Merch Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0c0c0f;--bg-2:#141418;--surface:#1a1a20;--surface-2:#222228;--surface-3:#2c2c34;
      --border:#33333c;--border-light:#40404c;
      --text:#f0f0f3;--text-2:#b0b0b8;--text-3:#787880;
      --accent:#6c7bf7;--accent-2:#818cf8;
      --red:#ef4444;--red-bg:rgba(239,68,68,.12);
      --orange:#f97316;--orange-bg:rgba(249,115,22,.12);
      --yellow:#eab308;--yellow-bg:rgba(234,179,8,.12);
      --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
      --green:#22c55e;--green-bg:rgba(34,197,94,.12);
      --gray:#71717a;--gray-bg:rgba(113,113,122,.1);
      --r:8px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Noto Sans JP','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
    a{color:var(--accent-2);text-decoration:none}
    button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

    /* ── Top Bar ── */
    .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:rgba(12,12,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .topbar-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}
    .topbar-logo .dot{color:var(--accent);font-size:16px}
    .topbar-fresh{font-size:10px;color:var(--text-3);font-weight:600;margin-left:auto}
    .topbar-links{display:flex;gap:4px;margin-left:12px}
    .topbar-links a{padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;color:var(--text-3);transition:all .15s}
    .topbar-links a:hover{color:var(--text);background:var(--surface-2)}
    .topbar-links a.active{color:#fff;background:var(--accent)}

    /* ── Tab Navigation ── */
    .tabs{display:flex;gap:0;background:var(--bg-2);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:10px 18px;font-size:12px;font-weight:700;color:var(--text-3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;cursor:pointer}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab .badge-n{display:inline-block;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:800;background:var(--surface-3);margin-left:4px}
    .tab.active .badge-n{background:rgba(108,123,247,.2);color:var(--accent)}

    /* ── Filter Bar ── */
    .fbar{display:flex;align-items:center;gap:4px;padding:8px 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
    .fbar::-webkit-scrollbar{display:none}
    .fbtn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);transition:all .15s;white-space:nowrap}
    .fbtn:hover{border-color:var(--accent)}
    .fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .fbtn .n{font-size:10px;font-weight:800;padding:1px 5px;border-radius:999px;background:var(--surface-3)}
    .fbtn.active .n{background:rgba(255,255,255,.2)}
    .fbtn.all .n{background:rgba(108,123,247,.15);color:var(--accent)}
    .fcount{font-size:11px;color:var(--text-3);margin-left:auto;padding-right:8px;white-space:nowrap}
    .fcount span{font-weight:800;color:var(--text)}

    /* ── Intake List ── */
    .intake-header{display:grid;grid-template-columns:80px 1fr 100px 100px;padding:8px 20px;font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg-2)}
    .intake-row{display:grid;grid-template-columns:80px 1fr 100px 100px;padding:8px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;align-items:center}
    .intake-row:hover{background:var(--surface)}
    .intake-row.analyzed{border-left:3px solid var(--green)}
    .intake-row.pending{border-left:3px solid var(--yellow)}
    .intake-thumb{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
    .intake-thumb-ph{width:64px;height:64px;border-radius:6px;background:var(--surface-3);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-3)}
    .intake-info{padding-left:10px;min-width:0}
    .intake-mid{font-size:10px;font-weight:800;color:var(--accent);font-family:'Inter',monospace}
    .intake-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .intake-status{font-size:10px;font-weight:700}
    .intake-status.green{color:var(--green)}
    .intake-status.yellow{color:var(--yellow)}

    /* ── Product List ── */
    .list-header{display:grid;grid-template-columns:260px 1fr 100px 90px;padding:8px 20px;font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg-2);position:sticky;top:100px;z-index:50}
    .list-body{min-height:300px}
    .row{display:grid;grid-template-columns:260px 1fr 100px 90px;padding:8px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;align-items:center}
    .row:hover{background:var(--surface)}
    .row.red{border-left:3px solid var(--red)}.row.orange{border-left:3px solid var(--orange)}.row.yellow{border-left:3px solid var(--yellow)}.row.blue{border-left:3px solid var(--blue)}.row.green{border-left:3px solid var(--green)}.row.gray{border-left:3px solid var(--gray)}
    /* AI画像と実物写真の分離表示 */
    .row-photos{display:flex;align-items:center;gap:8px}
    .photo-group{display:flex;flex-direction:column;gap:2px}
    .photo-group-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;text-align:center}
    .photo-group-label.ai{color:rgba(108,123,247,.7)}
    .photo-group-label.real{color:var(--text-3)}
    .photo-row{display:flex;gap:3px}
    .photo-row img{width:64px;height:64px;object-fit:cover;border-radius:5px;border:2px solid transparent}
    .photo-group.ai .photo-row img{border-color:rgba(108,123,247,.3)}
    .photo-group.real .photo-row img{border-color:var(--border)}
    .photo-row .ph{width:64px;height:64px;border-radius:5px;background:var(--surface-3);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-3);font-weight:700;flex-shrink:0}
    .photo-group.ai .photo-row .ph{border-color:rgba(108,123,247,.2)}
    .photo-divider{width:2px;height:56px;background:linear-gradient(to bottom,rgba(108,123,247,.4),var(--border-light));border-radius:1px;margin:0 2px;flex-shrink:0}
    .row-info{min-width:0;padding-left:10px}
    .row-mid{font-size:10px;font-weight:800;color:var(--accent);font-family:'Inter',monospace;letter-spacing:.02em}
    .row-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .row-status{display:flex;justify-content:center}
    .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800;text-align:center}
    .badge.red{background:var(--red-bg);color:var(--red)}.badge.orange{background:var(--orange-bg);color:var(--orange)}.badge.yellow{background:var(--yellow-bg);color:var(--yellow)}.badge.blue{background:var(--blue-bg);color:var(--blue)}.badge.green{background:var(--green-bg);color:var(--green)}.badge.gray{background:var(--gray-bg);color:var(--gray)}
    .row-price{text-align:right;font-size:13px;font-weight:700;padding-right:8px}
    .row-price.muted{color:var(--text-3);font-size:11px}

    /* ── Published List ── */
    .pub-header{display:grid;grid-template-columns:220px 1fr 70px 70px 70px 60px 60px 70px;padding:8px 20px;font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg-2);position:sticky;top:100px;z-index:50}
    .pub-row{display:grid;grid-template-columns:220px 1fr 70px 70px 70px 60px 60px 70px;padding:8px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;align-items:center}
    .pub-row:hover{background:var(--surface)}
    .pub-photos{display:flex;gap:2px;align-items:center}
    .pub-photos img{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
    .pub-photos .ph{width:40px;height:40px;border-radius:4px;background:var(--surface-3);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--text-3);font-weight:700;flex-shrink:0}
    .pub-info{padding-left:8px;min-width:0}
    .pub-mid{font-size:9px;font-weight:800;color:var(--accent);font-family:'Inter',monospace}
    .pub-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .pub-stat{text-align:center;font-size:11px;color:var(--text-2);white-space:nowrap}
    .pub-stat.empty{color:var(--text-3);font-size:9px}
    .pub-stat.date{font-size:10px}
    .pub-link{text-align:center}
    .pub-link a{font-size:10px;font-weight:700;color:var(--accent)}

    /* ── Empty ─ */
    .empty{text-align:center;padding:60px 20px;color:var(--text-3)}
    .empty-icon{font-size:40px;margin-bottom:8px}
    .empty-text{font-size:13px;font-weight:600}

    /* ── Detail Panel ── */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.open{opacity:1;pointer-events:auto}
    .panel{position:fixed;top:0;right:0;bottom:0;z-index:210;width:min(640px,100vw);background:var(--bg-2);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .panel.open{transform:translateX(0)}
    .panel-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;padding:14px 18px;background:rgba(20,20,24,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .panel-close{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface-2);border:1px solid var(--border);transition:background .15s}
    .panel-close:hover{background:var(--surface-3)}
    .panel-title{flex:1;min-width:0}
    .panel-mid{font-size:10px;font-weight:800;color:var(--accent);font-family:'Inter',monospace}
    .panel-name{font-size:14px;font-weight:800;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .panel-section{padding:16px 18px;border-bottom:1px solid var(--border)}
    .panel-section:last-child{border-bottom:none}
    .panel-label{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    /* 左右に分けた写真表示 */
    .photo-side{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .photo-col-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .photo-col-label.ai{color:rgba(108,123,247,.7)}
    .photo-col-label.real{color:var(--text-3)}
    .photo-viewer{display:flex;gap:4px;flex-wrap:wrap}
    .photo-viewer img{width:80px;height:80px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in}
    .photo-viewer img:hover{opacity:.85}
    .photo-viewer.ai img{border-color:rgba(108,123,247,.35)}
    .photo-viewer .ph{width:80px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);border:1px dashed var(--border);font-size:10px;color:var(--text-3);font-weight:700}
    .info-row{display:flex;gap:10px;padding:7px 0;font-size:12px;border-bottom:1px solid var(--border)}
    .info-row:last-child{border-bottom:none}
    .info-label{flex:0 0 80px;color:var(--text-3);font-weight:600}
    .info-value{flex:1;color:var(--text);word-break:break-word}
    .alert-box{padding:10px 12px;border-radius:var(--r);font-size:11px;line-height:1.7}
    .alert-box.red{background:var(--red-bg);border:1px solid rgba(239,68,68,.2);color:var(--red)}
    .alert-box.orange{background:var(--orange-bg);border:1px solid rgba(249,115,22,.2);color:var(--orange)}
    .alert-box.yellow{background:var(--yellow-bg);border:1px solid rgba(234,179,8,.2);color:var(--yellow)}
    .alert-box.blue{background:var(--blue-bg);border:1px solid rgba(59,130,246,.2);color:var(--blue)}
    .action-btns{display:flex;gap:6px;padding:16px 18px;flex-wrap:wrap}
    .abtn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:var(--r);font-size:12px;font-weight:700;background:var(--accent);color:#fff;transition:background .15s}
    .abtn:hover{background:var(--accent-2)}
    .abtn.sec{background:var(--surface-2);border:1px solid var(--border)}
    .abtn.sec:hover{background:var(--surface-3)}

    /* ── Responsive ── */
    @media(max-width:1200px){
      .pub-header,.pub-row{grid-template-columns:180px 1fr 60px 60px 60px 55px 55px 60px}
    }
    @media(max-width:900px){
      .list-header,.row{grid-template-columns:200px 1fr 90px 80px}
      .pub-header,.pub-row{grid-template-columns:1fr}
      .pub-header{display:none}
      .intake-header{display:none}
      .intake-row{grid-template-columns:64px 1fr}
      .photo-side{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo"><span class="dot">●</span>Merch Desk</div>
  <div class="topbar-fresh" id="fresh"></div>
  <nav class="topbar-links">
    <a href="./index.html" class="active">商品</a>
    <a href="./shipping.html">発送</a>
    <a href="./routing.html">販路</a>
    <a href="./roles.html">AI役職</a>
  </nav>
</header>

<div class="tabs" id="maintabs"></div>
<div id="content"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel"></div>

<script src="./status_snapshot.js?v=10"></script>
<script src="./intake_snapshot.js?v=10"></script>
<script src="./milestone_snapshot.js?v=10"></script>
<script>
(function(){
  var S=window.ZERO_COST_STATUS||{}, I=window.ZERO_COST_INTAKE||{};
  var items=I.items||[];
  var gen=S.generated_at||I.generated_at||'';
  if(gen) document.getElementById('fresh').textContent='更新 '+gen.replace(/ JST$/,'').replace(/ UTC$/,'');

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function pn(it){return it.product_name||(it.resolved&&it.resolved.product_name)||(it.commerce&&it.commerce.product_name)||'商品名未定'}

  function classify(it){
    var ps=String(it.publish_state||(it.commerce&&it.commerce.publish_state)||'').trim();
    var rs=String((it.resolved&&it.resolved.resolution_status)||'');
    var hq=String(it.qwen_hq_resolution||'');
    var is_=String((it.identification&&it.identification.state)||'');
    var img=String((it.resolved&&it.resolved.official_image_state)||'');
    if(hq==='blocked') return {k:'blocked',l:'HQ差し止め',c:'red'};
    if(hq==='needs_split'||is_==='split_required') return {k:'split',l:'要再束ね',c:'orange'};
    if(ps==='API公開済み') return {k:'published',l:'公開済み',c:'green'};
    if(ps==='カテゴリ審査待ち') return {k:'review',l:'審査待ち',c:'yellow'};
    if(rs==='confirmed'||rs==='provisional'){
      if(img.indexOf('actual-only')>=0) return {k:'actual',l:'実物一致',c:'blue'};
      if(img.indexOf('exact-match不可')>=0) return {k:'exact-no',l:'比較不一致',c:'yellow'};
      if(img.indexOf('exact-match保留')>=0) return {k:'exact-pend',l:'保留',c:'yellow'};
      if(img.indexOf('比較画像待ち')>=0||img.indexOf('調査画像待ち')>=0) return {k:'img-wait',l:'画像未取得',c:'yellow'};
      return {k:'draft',l:'出品準備可',c:'blue'};
    }
    return {k:'unidentified',l:'特定待ち',c:'gray'};
  }

  items.forEach(function(it){it._c=classify(it)});

  function getRealThumbs(it){
    var slots=it.slots||[],out=[];
    ['FRONT','BACK','CODE'].forEach(function(sn){
      var found=null;
      for(var i=0;i<slots.length;i++){if(slots[i].slot===sn&&slots[i].resident_url){found=slots[i].resident_url;break}}
      out.push(found?{url:found,l:sn}:{url:'',l:sn});
    });
    return out;
  }

  function getAIImages(it){
    var urls=[];
    if(it.resolved&&it.resolved.official_image_url) urls.push({url:it.resolved.official_image_url});
    var src=it.comparison_images||it.reference_images||[];
    for(var i=0;i<src.length;i++){var u=src[i].url||'';if(u&&!urls.find(function(x){return x.url===u}))urls.push({url:u})}
    return urls;
  }

  // ── Tabs ──
  var pubCount=items.filter(function(it){return it._c.k==='published'}).length;
  var tabDefs=[
    {k:'intake',l:'写真受入',n:items.length},
    {k:'products',l:'商品一覧',n:items.length},
    {k:'published',l:'出品済み',n:pubCount}
  ];
  var activeTab='intake';

  function renderTabs(){
    document.getElementById('maintabs').innerHTML=tabDefs.map(function(t){
      return '<div class="tab'+(activeTab===t.k?' active':'')+'" data-k="'+esc(t.k)+'" onclick="setTab(\''+esc(t.k)+'\')">'+esc(t.l)+' <span class="badge-n">'+t.n+'</span></div>';
    }).join('');
  }

  window.setTab=function(k){activeTab=k;renderTabs();renderContent()};

  function renderContent(){
    var el=document.getElementById('content');
    if(activeTab==='intake') renderIntake(el);
    else if(activeTab==='products') renderProducts(el);
    else renderPublished(el);
  }

  // ── Intake Tab ──
  function renderIntake(el){
    var header='<div class="intake-header"><div class="lh-label">写真</div><div>商品</div><div style="text-align:center">状態</div><div style="text-align:center">価格</div></div>';
    var rows=items.map(function(it){
      var c=it._c;
      var thumb=getRealThumbs(it)[0];
      var analyzed=c.k!=='unidentified'&&c.k!=='split';
      var price=it.commerce&&it.commerce.listing_price||it.listing_price;
      return '<div class="intake-row '+(analyzed?'analyzed':'pending')+'" onclick="openD(\''+esc(it.management_id)+'\')">'
        +(thumb.url?'<img class="intake-thumb" src="'+esc(thumb.url)+'" alt="" loading="lazy">':'<div class="intake-thumb-ph">📷</div>')
        +'<div class="intake-info"><div class="intake-mid">'+esc(it.management_id)+'</div><div class="intake-name">'+esc(pn(it))+'</div></div>'
        +'<div style="text-align:center"><span class="intake-status '+(analyzed?'green':'yellow')+'">'+(analyzed?'✅ 分析済み':'⏳ 分析待ち')+'</span></div>'
        +'<div style="text-align:right;font-size:12px;font-weight:700;color:var(--text-2)">'+(price?'¥'+Number(price).toLocaleString():'未定')+'</div>'
        +'</div>';
    }).join('');
    el.innerHTML=header+rows;
  }

  // ── Products Tab ──
  var af='all';
  var cats=[
    {k:'all',l:'全件'},{k:'published',l:'公開済み'},{k:'actual',l:'実物一致'},{k:'draft',l:'出品準備可'},
    {k:'exact-pend',l:'保留'},{k:'exact-no',l:'比較不一致'},{k:'img-wait',l:'画像未取得'},
    {k:'review',l:'審査待ち'},{k:'split',l:'要再束ね'},{k:'blocked',l:'HQ差し止め'},{k:'unidentified',l:'特定待ち'}
  ];

  function renderProducts(el){
    var fbarHtml=cats.map(function(c){
      var n=c.k==='all'?items.length:items.filter(function(it){return it._c.k===c.k}).length;
      if(n===0&&c.k!=='all')return '';
      var cls=c.k==='all'?'fbtn all':'fbtn';
      if(af===c.k)cls+=' active';
      return '<button class="'+cls+'" onclick="setF(\''+esc(c.k)+'\')">'+esc(c.l)+' <span class="n">'+n+'</span></button>';
    }).join('');
    var cnt=af==='all'?items.length:items.filter(function(it){return it._c.k===af}).length;
    var fc='<div class="fcount"><span>'+cnt+'</span> / '+items.length+' 件</div>';
    var header='<div class="list-header"><div class="lh-label">写真 (AI | 実物)</div><div>商品</div><div style="text-align:center">状態</div><div style="text-align:right;padding-right:8px">価格</div></div>';
    var filtered=af==='all'?items:items.filter(function(it){return it._c.k===af});
    var rows='';
    if(!filtered.length) rows='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">このカテゴリに商品はありません</div></div>';
    else rows=filtered.map(function(it){
      var c=it._c;
      var ai=getAIImages(it);
      var aiHtml=ai.length?ai.slice(0,2).map(function(x){return '<img src="'+esc(x.url)+'" alt="" loading="lazy">';}).join(''):'<div class="ph">—</div>';
      var real=getRealThumbs(it);
      var realHtml=real.slice(0,2).map(function(t){return t.url?'<img src="'+esc(t.url)+'" alt="" loading="lazy">':'<div class="ph">'+esc(t.l)+'</div>';}).join('');
      var price=it.commerce&&it.commerce.listing_price||it.listing_price;
      return '<div class="row '+c.c+'" onclick="openD(\''+esc(it.management_id)+'\')">'
        +'<div class="row-photos">'
        +'<div class="photo-group ai"><div class="photo-group-label ai">AI</div><div class="photo-row">'+aiHtml+'</div></div>'
        +'<div class="photo-divider"></div>'
        +'<div class="photo-group real"><div class="photo-group-label real">実物</div><div class="photo-row">'+realHtml+'</div></div>'
        +'</div>'
        +'<div class="row-info"><div class="row-mid">'+esc(it.management_id)+'</div><div class="row-name">'+esc(pn(it))+'</div></div>'
        +'<div class="row-status"><span class="badge '+c.c+'">'+esc(c.l)+'</span></div>'
        +'<div class="row-price'+(price?'':' muted')+'">'+(price?'¥'+Number(price).toLocaleString():'未定')+'</div>'
        +'</div>';
    }).join('');
    el.innerHTML='<div class="fbar">'+fbarHtml+fc+'</div>'+header+'<div class="list-body">'+rows+'</div>';
  }

  window.setF=function(k){af=k;renderProducts(document.getElementById('content'))};

  // ── Published Tab ──
  function renderPublished(el){
    var pub=items.filter(function(it){return it._c.k==='published'});
    if(!pub.length){el.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">まだ出品済みの商品はありません</div></div>';return}
    var header='<div class="pub-header"><div class="lh-label">写真</div><div>商品</div><div style="text-align:center">価格</div><div style="text-align:center">相場</div><div style="text-align:center">出品日</div><div style="text-align:center">閲覧</div><div style="text-align:center">問合せ</div><div style="text-align:center">リンク</div></div>';
    var rows=pub.map(function(it){
      var com=it.commerce||{};
      var price=com.listing_price||it.listing_price;
      var fp=com.market_floor_price||'';
      var updatedAt=com.updated_at||'';
      var listDate=updatedAt?updatedAt.split(' ')[0]:'—';
      var viewCount='—';
      var inquiryCount='—';
      var listingUrl=com.public_listing_url||'';
      // 写真: AI収集 + 実物
      var ai=getAIImages(it);
      var real=getRealThumbs(it);
      var allPhotos=[];
      ai.forEach(function(x){allPhotos.push(x)});
      real.forEach(function(r){if(r.url)allPhotos.push({url:r.url})});
      var photoHtml=allPhotos.slice(0,6).map(function(p){
        return p.url?'<img src="'+esc(p.url)+'" alt="" loading="lazy">':'<div class="ph">—</div>';
      }).join('');
      return '<div class="pub-row" onclick="openD(\''+esc(it.management_id)+'\')">'
        +'<div class="pub-photos">'+photoHtml+'</div>'
        +'<div class="pub-info"><div class="pub-mid">'+esc(it.management_id)+'</div><div class="pub-name">'+esc(pn(it))+'</div></div>'
        +'<div class="pub-stat" style="font-weight:700;font-size:12px">'+(price?'¥'+Number(price).toLocaleString():'—')+'</div>'
        +'<div class="pub-stat'+(fp?'':' empty')+'">'+(fp?'¥'+Number(fp).toLocaleString():'—')+'</div>'
        +'<div class="pub-stat date">'+listDate+'</div>'
        +'<div class="pub-stat">'+viewCount+'</div>'
        +'<div class="pub-stat">'+inquiryCount+'</div>'
        +'<div class="pub-link">'+(listingUrl?'<a href="'+esc(listingUrl)+'" target="_blank" onclick="event.stopPropagation()">商品 →</a>':'—')+'</div>'
        +'</div>';
    }).join('');
    el.innerHTML=header+rows;
  }

  renderTabs();
  renderContent();

  // ── Detail Panel ──
  window.openD=function(mid){
    var it=null;
    for(var i=0;i<items.length;i++){if(items[i].management_id===mid){it=items[i];break}}
    if(!it)return;
    var c=it._c;
    var thumbs=getRealThumbs(it);
    var pv=thumbs.map(function(t){return t.url?'<img src="'+esc(t.url)+'" alt="'+esc(t.l)+'" loading="lazy">':'<div class="ph">'+esc(t.l)+'</div>';}).join('');

    var com=it.commerce||{};
    var price=com.listing_price||it.listing_price;
    var fp=com.market_floor_price||'';
    var listingUrl=com.public_listing_url||'';
    var updatedAt=com.updated_at||'';
    var listingId=com.listing_id||'';

    var rows=[];
    if(com.brand) rows.push(['ブランド',com.brand]);
    if(com.category) rows.push(['カテゴリ',com.category]);
    if(it.resolved&&it.resolved.barcode_primary) rows.push(['コード',it.resolved.barcode_primary]);
    if(it.resolved&&it.resolved.note) rows.push(['特定メモ',it.resolved.note]);
    if(it.manual_note) rows.push(['現物メモ',it.manual_note]);
    if(listingId) rows.push(['出品ID',listingId]);
    if(updatedAt) rows.push(['出品日時',updatedAt]);
    var rh=rows.map(function(r){return '<div class="info-row"><div class="info-label">'+esc(r[0])+'</div><div class="info-value">'+esc(r[1])+'</div></div>'}).join('');

    var alert='';
    if(c.k==='blocked') alert='<div class="alert-box red">⛔ '+esc(it.qwen_hq_review_note||'HQ差し止め')+'</div>';
    else if(c.k==='split') alert='<div class="alert-box orange">🔀 '+esc(it.split_plan_summary||it.manual_note||'写真の再束ねが必要です')+'</div>';
    else if(c.k==='exact-no') alert='<div class="alert-box yellow">比較画像と実物が一致しません。実物写真のみで出品可能です。</div>';
    else if(c.k==='exact-pend') alert='<div class="alert-box yellow">袋越しで細部未確認。実物写真のみで出品可能です。</div>';
    else if(c.k==='img-wait') alert='<div class="alert-box yellow">比較画像未取得。実物写真のみで出品可能です。</div>';
    else if(c.k==='actual') alert='<div class="alert-box blue">✅ 実物+ラベル一致。出品可能です。</div>';

    // AI収集画像
    var ai=getAIImages(it);
    var aiHtml=ai.length?'<div class="photo-viewer ai">'+ai.map(function(img){
      return '<img src="'+esc(img.url)+'" alt="" loading="lazy">';
    }).join('')+'</div>':'<div style="color:var(--text-3);font-size:11px">未取得</div>';

    var h=
      '<div class="panel-header">'
      +'<button class="panel-close" onclick="closePanel()">✕</button>'
      +'<div class="panel-title"><div class="panel-mid">'+esc(it.management_id)+'</div><div class="panel-name">'+esc(pn(it))+'</div></div>'
      +'</div>'
      +'<div class="panel-section">'
      +'<div class="photo-side">'
      +'<div class="photo-col"><div class="photo-col-label ai">🤖 AI収集 比較画像</div>'+aiHtml+'</div>'
      +'<div class="photo-col"><div class="photo-col-label real">📷 実物写真</div><div class="photo-viewer">'+pv+'</div></div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">'
      +'<span class="badge '+c.c+'">'+esc(c.l)+'</span>'
      +(price?'<span style="font-size:15px;font-weight:800">¥'+Number(price).toLocaleString()+'</span>':'')
      +(fp?'<span style="font-size:11px;color:var(--text-3)">相場 ¥'+Number(fp).toLocaleString()+'</span>':'')
      +'</div></div>';

    if(alert) h+='<div class="panel-section">'+alert+'</div>';
    if(rh) h+='<div class="panel-section"><div class="panel-label">商品情報</div>'+rh+'</div>';

    h+='<div class="action-btns">'
      +'<a class="abtn" href="./ops.html?mid='+esc(it.management_id)+'">商品一覧で開く</a>'
      +'<a class="abtn sec" href="./intake_cards.html?mid='+esc(it.management_id)+'">写真カード</a>'
      +(listingUrl?'<a class="abtn sec" href="'+esc(listingUrl)+'" target="_blank">メルカリで見る</a>':'')
      +'</div>';

    document.getElementById('panel').innerHTML=h;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
    document.body.style.overflow='hidden';
  };

  window.closePanel=function(){
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
    document.body.style.overflow='';
  };
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel()});
})();
</script>
</body>
</html>
