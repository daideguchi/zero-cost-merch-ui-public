<!doctype html>
<html lang="ja" data-page="intake">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>0円仕入れ物販事業 | 写真</title>
  <link rel="stylesheet" href="./common.css">
  <style>
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .hq-wrap { max-width: 1320px; }
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .hero-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -.02em;
    }
    .hero-note {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.7;
      display: none;
    }
    .hero-memo {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(37,99,235,.18);
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-2);
      display: none;
    }
    .hero-memo strong,
    .hero-memo code {
      color: #1d4ed8;
      font-weight: 900;
    }
    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      display: none;
    }
    .box-switchbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .box-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      background: linear-gradient(180deg, #ffffff 0%, #edf2f7 100%);
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
      color: #0f172a;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }
    .box-switch:hover {
      border-color: #2563eb;
      box-shadow: 0 8px 18px rgba(37,99,235,.16);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .box-switch.active {
      border-color: #1d4ed8;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      box-shadow: 0 10px 24px rgba(37,99,235,.24);
      color: #ffffff;
    }
    .box-switch-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      background: #e2e8f0;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      color: #0f172a;
    }
    .box-switch.active .box-switch-count {
      border-color: rgba(255,255,255,.28);
      background: rgba(255,255,255,.18);
      color: #ffffff;
    }
    .box-switch-total {
      font-size: 11px;
      font-weight: 900;
      color: #475569;
      white-space: nowrap;
    }
    .box-switch.active .box-switch-total {
      color: rgba(255,255,255,.92);
    }
    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      background: linear-gradient(180deg, #ffffff 0%, #eef3f8 100%);
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
      font-size: 12px;
      font-weight: 800;
      color: #0f172a;
    }
    .hero-pill-money {
      border-color: rgba(29,78,216,.24);
      background: linear-gradient(180deg, #f8fbff 0%, #e8f1ff 100%);
      color: #1d4ed8;
    }
    .step-trail {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 11px;
      font-weight: 800;
    }
    .step-dot {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-3);
    }
    .step-dot.done {
      border-color: rgba(21,128,61,.22);
      background: rgba(21,128,61,.08);
      color: var(--green);
    }
    .step-dot.current {
      border-color: rgba(37,99,235,.24);
      background: rgba(37,99,235,.08);
      color: var(--accent);
    }
    .step-sep {
      color: var(--text-3);
      font-size: 10px;
    }
    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filter-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-align: left;
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      background: linear-gradient(180deg, #ffffff 0%, #edf2f7 100%);
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
      color: #0f172a;
      cursor: pointer;
      transition: border-color .16s, background .16s, box-shadow .16s, transform .16s;
    }
    .filter-card:hover {
      border-color: #2563eb;
      box-shadow: 0 8px 18px rgba(37,99,235,.16);
      transform: translateY(-1px);
    }
    .filter-card:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
    .filter-card.active {
      border-color: #1d4ed8;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      box-shadow: 0 10px 24px rgba(37,99,235,.24);
      color: #ffffff;
    }
    .filter-count {
      display: none;
    }
    .filter-label {
      margin-top: 0;
      font-size: 12px;
      font-weight: 900;
      color: inherit;
    }
    .filter-card.active .filter-count {
      border-color: rgba(255,255,255,.26);
      background: rgba(255,255,255,.18);
      color: #ffffff;
    }
    .toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      position: sticky;
      top: var(--hq-sticky-offset, 53px);
      z-index: 40;
      background: var(--bg);
      padding: 8px 0;
    }
    .toolbar-main,
    .bulk-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .search {
      flex: 1;
      min-width: 240px;
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: 14px/1.4 inherit;
    }
    .sort-select,
    .reset-btn {
      padding: 11px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font: 13px/1.4 inherit;
    }
    .sort-select { cursor: pointer; }
    .reset-btn {
      cursor: pointer;
      font-weight: 800;
    }
    .search:focus,
    .sort-select:focus,
    .reset-btn:focus {
      outline: none;
      border-color: var(--accent);
    }
    .count-pill {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #94a3b8;
      background: linear-gradient(180deg, #ffffff 0%, #edf2f7 100%);
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
      font-size: 12px;
      font-weight: 800;
      color: #0f172a;
      white-space: nowrap;
    }
    .count-pill.secondary {
      border-color: rgba(15,23,42,.12);
      background: #ffffff;
      color: var(--text-2);
    }
    .toolbar-btn {
      min-height: 40px;
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font: 12px/1.25 inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15,23,42,.05);
    }
    .toolbar-btn.primary {
      border-color: #1d4ed8;
      background: #1d4ed8;
      color: #fff;
    }
    .toolbar-btn.warn {
      border-color: rgba(180,83,9,.24);
      background: #fff7ed;
      color: #b45309;
    }
    .toolbar-btn:disabled {
      opacity: .55;
      cursor: default;
      box-shadow: none;
    }
    .bulk-message {
      min-height: 18px;
      font-size: 12px;
      font-weight: 800;
      color: var(--text-3);
    }
    .bulk-message.error {
      color: var(--red);
    }
    .item-list {
      display: grid;
      gap: 12px;
    }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color .16s;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .item-card:hover {
      border-color: var(--accent);
    }
    .item-card.deep-linked {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37,99,235,.16);
    }
    .item-shell {
      padding: 10px 12px;
    }
    /* コンパクトUI */
    .item-card.compact {
      margin-bottom: 8px;
    }
    .compact-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .compact-header:hover {
      background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
    }
    .compact-select { flex-shrink: 0; }
    .compact-no {
      font-size: 13px;
      font-weight: 900;
      color: #1e293b;
      min-width: 60px;
    }
    .compact-counts {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }
    .compact-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #475569;
      font-weight: 700;
    }
    .compact-status.ready {
      background: #dcfce7;
      color: #166534;
    }
    .compact-name {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .compact-toggle {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #475569;
      font-weight: 700;
    }
    /* 写真左右比較 */
    .photos-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      background: #f8fafc;
    }
    .photo-col {
      min-width: 0;
    }
    .photo-col-head {
      font-size: 12px;
      font-weight: 800;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .ai-col .photo-col-head {
      background: rgba(37,99,235,.1);
      color: #1d4ed8;
    }
    .actual-col .photo-col-head {
      background: rgba(21,128,61,.1);
      color: #166534;
    }
    /* 人確認セクション */
    .human-check-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      background: #fffbeb;
      border-top: 1px solid #fde68a;
    }
    .check-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #92400e;
      cursor: pointer;
    }
    .check-label input {
      margin: 0;
    }
    .check-save {
      margin-left: auto;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #f59e0b;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    /* コンパクトアクション */
    .compact-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    .compact-actions a,
    .compact-actions button {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .compact-actions a {
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
    }
    .compact-links {
      padding: 8px 12px;
      font-size: 12px;
    }
    .compact-links a {
      color: var(--accent);
    }
    /* 手動出品トグル */
    .manual-listing.collapsed {
      border-top: 1px solid var(--border);
    }
    .manual-toggle-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f1f5f9;
      cursor: pointer;
    }
    .manual-toggle-bar:hover {
      background: #e2e8f0;
    }
    .manual-toggle-label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #64748b;
      color: #fff;
      font-weight: 700;
    }
    .manual-toggle-summary {
      flex: 1;
      font-size: 12px;
      color: #475569;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .manual-toggle-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #475569;
      font-weight: 700;
    }
    .manual-content {
      padding: 12px;
      background: #fff;
    }
    /* AI不一致バナー */
    .mismatch-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      background: #fef2f2;
      border-top: 1px solid #fecaca;
    }
    .mismatch-banner span {
      font-size: 12px;
      font-weight: 700;
      color: #dc2626;
    }
    .mismatch-banner button {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: #dc2626;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .item-card .detail-extra {
      display: none;
    }
    .item-card.expanded .detail-extra {
      display: block;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .photo-compare-section {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 6px;
    }
    .compare-col { min-width: 0; }
    .compare-label {
      font-size: 12px;
      font-weight: 900;
      padding: 6px 8px;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .compare-label.ai {
      background: rgba(37,99,235,.08);
      color: #1d4ed8;
    }
    .compare-label.actual {
      background: rgba(21,128,61,.08);
      color: #166534;
    }
    .ai-photo-grid,
    .actual-photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
    }
    .photo-compare-section .actual-photo-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
      align-items: stretch;
    }
    .photo-compare-section .actual-photo-grid > .actual-card,
    .photo-compare-section .actual-photo-grid > .actual-missing {
      flex: 0 0 min(150px, calc((100% - 16px) / 3));
      margin: 0;
      transform: none;
    }
    .ai-thumb,
    .actual-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface-2);
    }
    .ai-thumb img,
    .actual-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-verdict {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 6px 0;
    }
    .verdict-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(185,28,28,.3);
      background: #fff5f5;
      color: #b91c1c;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      transition: all .16s;
    }
    .verdict-btn:hover {
      background: #fecaca;
      border-color: #b91c1c;
    }
    .verdict-btn.verdict-ok {
      border-color: rgba(21,128,61,.3);
      background: #f0fdf4;
      color: #166534;
    }
    .verdict-btn.verdict-ok:hover {
      background: #dcfce7;
      border-color: #166534;
    }
    .verdict-btn.verdict-actual-only {
      border-color: #1d4ed8;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }
    .verdict-btn.verdict-actual-only:hover {
      background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
      box-shadow: 0 4px 14px rgba(37,99,235,.38);
    }
    .verdict-btn.verdict-hold {
      border-color: rgba(217,119,6,.3);
      background: #fffbeb;
      color: #d97706;
    }
    .verdict-btn.verdict-hold:hover {
      background: #fef3c7;
      border-color: #d97706;
    }
    .detail-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-3);
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
    }
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .gate-inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .gate-inline-note {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text-3);
      font-weight: 700;
    }
    .gate-inline-note.strong {
      color: #1d4ed8;
    }
    .item-card.ai-mismatch .ai-photo-grid img,
    .item-card.ai-mismatch .actual-photo-grid img {
      filter: grayscale(100%) brightness(.82);
    }
    .item-card.ai-mismatch .ai-photo-grid {
      position: relative;
    }
    .item-card.ai-mismatch .ai-photo-grid::after {
      content: 'AI画像不一致';
      position: absolute;
      top: 4px;
      left: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(185,28,28,.85);
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      z-index: 2;
    }
    .pagination-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 0;
      margin-top: 8px;
    }
    .page-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .page-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .page-btn:disabled {
      opacity: .35;
      cursor: default;
    }
    .mismatch-reason-box {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      border-left: 4px solid #dc2626;
      background: #fef2f2;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
    }
    .mismatch-reason-label {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #dc2626;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1;
    }
    .mismatch-reason-value {
      font-size: 12px;
      font-weight: 700;
    }
    .mismatch-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 8px 12px 0;
      padding: 6px 12px;
      border-radius: 8px;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }
    .badge-icon {
      font-size: 14px;
    }
    .reselect-prompt {
      margin: 8px 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px dashed #f59e0b;
      background: #fffbeb;
      text-align: center;
    }
    .reselect-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);

    }
    .trail-detail {
      font-weight: 700;
      opacity: .72;
    }
    /* ── mismatch reason chip (inline on card) ── */
    .mismatch-reason-inline {
      margin-top: 4px;
      margin-bottom: 2px;
    }
    .mismatch-reason-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 8px;
      border-left: 3px solid #dc2626;
      background: #fef2f2;
      color: #991b1b;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.4;
    }
    .mismatch-reason-badge strong {
      font-weight: 900;
      color: #b91c1c;
    }
    /* ── color-variant slot ── */
    .color-variant-slot {
      border: 2px solid rgba(37,99,235,.42) !important;
      box-shadow: 0 0 0 2px rgba(37,99,235,.1);
    }
    .slot-source-badge {
      position: absolute;
      top: 5px;
      right: 5px;
      z-index: 3;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 900;
      line-height: 1.3;
      letter-spacing: .02em;
      box-shadow: 0 2px 6px rgba(15,23,42,.22);
    }
    .slot-source-badge.color-variant {
      background: rgba(37,99,235,.9);
      color: #fff;
      border: 1px solid rgba(255,255,255,.25);
    }
    .slot-variant-detail {
      position: absolute;
      bottom: 30px;
      left: 4px;
      right: 4px;
      z-index: 3;
      padding: 3px 6px;
      border-radius: 5px;
      background: rgba(15,23,42,.78);
      color: #e0f2fe;
      font-size: 9px;
      font-weight: 800;
      line-height: 1.4;
      text-align: center;
      pointer-events: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header class="hq-header">
    <h1><span class="dot">●</span> 写真 · AI識別</h1>
  </header>

  <div class="hq-wrap">
    <section class="hero">
      <div id="hero-title" class="hero-title">番号ごとに確認する</div>
      <div id="hero-pills" class="hero-pills"></div>
    </section>

    <div class="filter-grid" id="filters"></div>

    <div class="toolbar">
      <div class="toolbar-main">
        <input id="search" class="search" type="text" placeholder="管理番号・商品名・箱で検索">
        <select id="sort-select" class="sort-select">
          <option value="intake">取込順</option>
          <option value="id">管理番号順</option>
          <option value="updated">更新日順</option>
        </select>
        <span id="count-pill" class="count-pill">- 件</span>
      </div>
      <div class="bulk-toolbar">
        <span id="selection-pill" class="count-pill secondary">選択 0件</span>
        <button id="select-visible" class="toolbar-btn" type="button">表示中を選択</button>
        <button id="select-unresolved" class="toolbar-btn" type="button">未特定だけ選択</button>
        <button id="clear-selection" class="toolbar-btn" type="button">選択解除</button>
        <button id="bulk-ai-on" class="toolbar-btn" type="button">AI画像OK</button>
        <button id="bulk-ai-off" class="toolbar-btn warn" type="button">AI画像保留</button>
        <button id="bulk-publish-on" class="toolbar-btn primary" type="button">出品OK</button>
        <button id="bulk-publish-off" class="toolbar-btn warn" type="button">出品保留</button>
      </div>
      <div id="bulk-message" class="bulk-message" aria-live="polite"></div>
    </div>

    <div class="item-list" id="item-list"></div>
    <div class="empty" id="empty" style="display:none">該当する商品がありません</div>
  </div>

  <div id="edit-modal" class="edit-modal" hidden>
    <div class="edit-panel" role="dialog" aria-modal="true" aria-labelledby="edit-title">
      <div id="edit-title" class="edit-title">登録情報を編集</div>
      <div id="edit-subtitle" class="edit-subtitle"></div>
      <div class="edit-field">
        <label for="edit-product-name">商品名</label>
        <input id="edit-product-name" type="text" maxlength="240">
      </div>
      <div class="edit-field">
        <label for="edit-listing-title">手動出品タイトル</label>
        <input id="edit-listing-title" type="text" maxlength="240">
      </div>
      <div class="edit-field">
        <label for="edit-market-price">相場・出品価格メモ</label>
        <input id="edit-market-price" type="text" maxlength="20" placeholder="例: 1480">
      </div>
      <div class="edit-field">
        <label for="edit-listing-description">手動出品説明文</label>
        <textarea id="edit-listing-description" maxlength="2200"></textarea>
      </div>
      <div class="edit-field">
        <label for="edit-manual-note">内部メモ</label>
        <textarea id="edit-manual-note" maxlength="1200"></textarea>
      </div>
      <div class="edit-field">
        <label for="edit-shared-note">管理表メモ</label>
        <textarea id="edit-shared-note" maxlength="1200"></textarea>
      </div>
      <div class="edit-field">
        <label for="edit-human-gate-note">確認メモ</label>
        <textarea id="edit-human-gate-note" maxlength="400"></textarea>
      </div>
      <div id="edit-message" class="edit-message"></div>
      <div class="edit-actions">
        <button id="edit-cancel" type="button">閉じる</button>
        <button id="edit-save" class="primary" type="button">保存する</button>
      </div>
    </div>
  </div>
  <div id="copy-toast" class="copy-toast" role="status" aria-live="polite">コピーしました</div>

  <script src="./intake_snapshot.js?v=2"></script>
  <script src="./role_packets_snapshot.js"></script>
  <script src="./common.js"></script>
  <script src="./intake_cards_app.js"></script>
  <script>
    // intake_cards_app.js に依存して初期化
    if (window.renderAll) {
      window.renderAll();
    }
  </script>
</body>
</html>
