<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>問合せ管理 - 0円仕入れ物販事業</title>
  <link rel="stylesheet" href="./common.css">
  <style>
    .inq-summary {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
      gap: 8px; margin-bottom: 16px;
    }
    .inq-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px; text-align: center;
    }
    .inq-stat-label { font-size: 9px; color: var(--text-3); font-weight: 700; }
    .inq-stat-value { font-size: 20px; font-weight: 900; margin-top: 2px; }
    .inq-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
    }
    .inq-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .inq-product { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .inq-meta { font-size: 10px; color: var(--text-3); margin-bottom: 6px; }
    .inq-customer { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .inq-question {
      font-size: 12px; color: var(--text-2); background: var(--surface-2);
      padding: 8px; border-radius: 6px; margin-bottom: 6px; line-height: 1.6;
    }
    .inq-reply {
      font-size: 11px; color: var(--text-3); padding: 8px;
      background: var(--surface-2); border-radius: 6px;
      border-left: 3px solid var(--accent); line-height: 1.6;
    }
    .inq-note {
      margin-top: 6px; font-size: 10px; color: var(--red);
    }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header class="hq-header">
    <h1><span class="dot">●</span> 0円仕入れ物販事業</h1>
    <span class="hq-fresh" id="freshness">更新 --</span>
    <nav class="hq-nav">
      <a href="./">📊統合</a><a href="./intake_cards.html">📥写真</a>
      <a href="./ops.html">📦商品</a><a href="./channel_listings.html">🏪出品</a>
      <a href="./unified_shipping.html">🚚発送</a><a href="./unified_inquiry.html" class="active">💬問合せ</a>
      <a href="./settings.html">⚙️設定</a>
    </nav>
  </header>
  <div class="hq-wrap">
    <div class="section-head"><span class="dot" style="background:var(--accent)"></span>問合せ管理（全チャネル統合）</div>
    <div class="inq-summary" id="inq-summary"></div>
    <div id="inq-list"></div>
  </div>
  <div class="hq-footer">
    <span id="snapshot-time">スナップショット: --</span>
  </div>
  <script src="./inquiry_snapshot.js?v=2"></script>
  <script>
    const inquiryData = window.ZERO_COST_INQUIRY || { summary: {}, inquiries: [] };

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function badgeClass(status) {
      return {
        ai_responded: "b-green",
        ai_processing: "b-yellow",
        dd_escalated: "b-red",
        pending: "b-blue",
        ignored_withdrawn: "b-gray",
      }[status] || "b-blue";
    }

    function statusLabel(status) {
      return {
        ai_responded: "AI対応済",
        ai_processing: "AI処理中",
        dd_escalated: "DDエスカレ",
        pending: "未対応",
        ignored_withdrawn: "対象外",
      }[status] || status;
    }

    function channelLabel(channel) {
      return {
        mercari: "メルカリ",
        rakuma: "ラクマ",
        yahoo_flea: "Yahooフリマ",
        yahoo_auction: "Yahooオークション",
      }[channel] || channel || "未設定";
    }

    function renderSummary(summary) {
      const cards = [
        { label: "総件数", value: summary.total || 0, color: "" },
        { label: "AI対応済", value: summary.ai_responded || 0, color: "var(--green)" },
        { label: "AI処理中", value: summary.ai_processing || 0, color: "var(--yellow)" },
        { label: "DDエスカレ", value: summary.dd_escalated || 0, color: "var(--red)" },
      ];
      return cards.map((card) => (
        `<div class="inq-stat"><div class="inq-stat-label">${card.label}</div><div class="inq-stat-value"${card.color ? ` style="color:${card.color}"` : ""}>${card.value}</div></div>`
      )).join("");
    }

    function renderInquiry(item) {
      const replyText = item.reply_text || item.draft_reply || "";
      const replyPrefix = item.reply_text ? "A: " : item.draft_reply ? "[下書き] " : "";
      const replyStyle = item.reply_text ? "" : ' style="opacity:.7"';
      const replyBlock = replyText
        ? `<div class="inq-reply"${replyStyle}>${replyPrefix}${escapeHtml(replyText)}</div>`
        : "";
      const noteBlock = item.escalation_reason
        ? `<div class="inq-note">⚠️ ${escapeHtml(item.escalation_reason)}</div>`
        : "";
      const managementLine = item.management_id
        ? `<div class="inq-meta">管理番号: ${escapeHtml(item.management_id)}</div>`
        : "";
      return `
        <div class="inq-card">
          <div class="inq-header">
            <span class="badge ${badgeClass(item.status)}">${statusLabel(item.status)}</span>
            <span style="font-size:10px;color:var(--text-3)">${escapeHtml(channelLabel(item.channel))}</span>
            <span style="font-size:10px;color:var(--text-3);margin-left:auto">${escapeHtml(item.question_date || "")}</span>
          </div>
          <div class="inq-product">${escapeHtml(item.product_name || "商品名未設定")}</div>
          ${managementLine}
          <div class="inq-customer">👤 ${escapeHtml(item.customer_name || "お客様")}</div>
          <div class="inq-question">${escapeHtml(item.question_text || "")}</div>
          ${replyBlock}
          ${noteBlock}
        </div>
      `;
    }

    function renderInquiries(items) {
      if (!items.length) {
        return `
          <div class="empty-state">
            <div class="icon">💬</div>
            <div>いま未処理の問合せはありません。</div>
          </div>
        `;
      }
      return items.map(renderInquiry).join("");
    }

    function render() {
      const summary = inquiryData.summary || {};
      const inquiries = Array.isArray(inquiryData.inquiries) ? inquiryData.inquiries : [];
      document.getElementById("inq-summary").innerHTML = renderSummary(summary);
      document.getElementById("inq-list").innerHTML = renderInquiries(inquiries);

      const generatedAt = inquiryData.generated_at || "--";
      document.getElementById("freshness").textContent = `更新 ${generatedAt}`;
      document.getElementById("snapshot-time").textContent = `スナップショット: ${generatedAt}`;
    }

    render();
  </script>
</body>
</html>
