<!doctype html>
<html lang="ja" data-page="shipping">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>発送</title>
  <link rel="stylesheet" href="./common.css">
  <style>
    /* ── workbench overrides ── */
    :root {
      --soft-border: rgba(15,23,42,.10);
      --card-r: 14px;
    }
    .hq-wrap { max-width: 720px }

    /* ── A. Progress rail ── */
    .wb-rail {
      padding: 14px 0 10px;
      border-bottom: 1px solid var(--border);
    }
    .wb-steps {
      display: flex;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .wb-steps::-webkit-scrollbar { display: none }
    .wb-step {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .wb-step-arrow {
      font-size: 11px;
      color: var(--border);
      padding: 0 6px;
      flex-shrink: 0;
    }
    .wb-step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .wb-step-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-3);
      white-space: nowrap;
    }
    .wb-step-count {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
    }
    .wb-step.done .wb-step-dot  { background: var(--green); }
    .wb-step.done .wb-step-label { color: var(--text-3); }
    .wb-step.current .wb-step-dot {
      background: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.14);
    }
    .wb-step.current .wb-step-label { color: var(--text); font-size: 13px; font-weight: 800; }
    .wb-step.current .wb-step-count { color: var(--text-2); }
    .wb-step.blocked .wb-step-dot { background: var(--red); box-shadow: 0 0 0 3px rgba(185,28,28,.14); }
    .wb-step.blocked .wb-step-label { color: var(--red); }

    /* ── B. Action banner ── */
    .wb-banner {
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .wb-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .wb-action-text {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
    }
    body[data-mode="idle"]   .wb-action-text,
    body[data-mode="sample"] .wb-action-text {
      color: var(--text-2);
      font-size: 20px;
    }
    .wb-banner-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .wb-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      border: 1px solid var(--soft-border);
      background: var(--surface-2);
      color: var(--text-2);
    }
    .wb-badge.ready    { background: var(--green-bg);  border-color: rgba(21,128,61,.3);  color: var(--green); }
    .wb-badge.active   { background: var(--blue-bg);   border-color: rgba(29,78,216,.3);  color: var(--blue); }
    .wb-badge.critical { background: var(--red-bg);    border-color: rgba(185,28,28,.3);  color: var(--red); }
    .wb-badge.sample   { background: var(--yellow-bg); border-color: rgba(146,64,14,.3);  color: var(--yellow); }
    .wb-banner-route { font-size: 12px; color: var(--text-3); }

    /* ── C. Focus card ── */
    .wb-focus { padding: 20px 0 0; }
    .wc {
      border: 1px solid var(--border);
      border-radius: var(--card-r);
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .wc.wc-sample  { border-style: dashed; }
    .wc.wc-idle    { border-style: dashed; background: var(--surface); }
    .wc.wc-handoff { border-color: rgba(21,128,61,.25); background: #f2fbf5; }
    .wc-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 16px 10px;
      gap: 10px;
    }
    .wc-title {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
    }
    .wc-stage {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
      border: 1px solid var(--soft-border);
      background: var(--surface-2);
      color: var(--text-2);
    }
    .wc-stage.ready    { background: var(--green-bg);  border-color: rgba(21,128,61,.3);  color: var(--green); }
    .wc-stage.high     { background: var(--orange-bg); border-color: rgba(180,83,9,.3);   color: var(--orange); }
    .wc-stage.critical { background: var(--red-bg);    border-color: rgba(185,28,28,.3);  color: var(--red); }
    .wc-idbar {
      padding: 0 16px 10px;
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .wc-action {
      margin: 0 12px 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.65;
      color: var(--text-2);
    }
    /* 2×2 value grid */
    .wc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
    }
    .wc-cell {
      padding: 14px 16px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .wc-cell:nth-child(2n) { border-right: none; }
    .wc-cell:nth-last-child(-n+2) { border-bottom: none; }
    .wc-cell.code-cell { background: var(--surface-2); }
    .wc-cell.missing   { background: var(--yellow-bg); }
    .wc-cell-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .wc-cell-value {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      word-break: break-all;
      flex: 1;
    }
    /* Code cell: big mono */
    .wc-cell.code-cell .wc-cell-value {
      font-family: "SF Mono","Fira Mono","Consolas",monospace;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: .03em;
      line-height: 1.15;
    }
    .wc-cell-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }
    .wc-btn {
      appearance: none;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .wc-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .wc-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── D. Queue ── */
    .wb-queue { margin-top: 20px; }
    .wb-queue-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-3);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .wb-qrow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .wb-qrow-stage {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text-3);
      border: 1px solid var(--border);
    }
    .wb-qrow-title {
      flex: 1;
      font-weight: 700;
      color: var(--text-2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .wb-qrow-code {
      font-family: "SF Mono","Fira Mono","Consolas",monospace;
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .wb-qrow-pickup {
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── E. Drawers ── */
    .wb-drawers { margin-top: 24px; display: grid; gap: 6px; padding-bottom: 40px; }
    .wb-drawer {
      border: 1px solid var(--border);
      border-radius: var(--card-r);
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .wb-drawer > summary {
      cursor: pointer;
      list-style: none;
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .wb-drawer > summary::-webkit-details-marker { display: none }
    .wb-drawer > summary::before {
      content: "▸";
      font-size: 11px;
      color: var(--text-3);
      transition: transform .15s;
      flex-shrink: 0;
    }
    .wb-drawer[open] > summary::before { transform: rotate(90deg); }
    .wb-drawer-body { padding: 0 16px 16px; }
    .wb-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .wb-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
    .wb-action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-top: 4px;
    }
    .wb-btn-lg {
      appearance: none;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .wb-btn-lg.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .wb-btn-lg.ghost   { background: transparent; color: var(--text-2); }
    .wb-btn-lg:disabled { opacity: .4; cursor: not-allowed; }
    details.wb-fold > summary {
      cursor: pointer;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-3);
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }
    details.wb-fold > summary::-webkit-details-marker { display: none }
    .wb-fold-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    /* ── Shared utility (reused in drawers) ── */
    .simple-list { display: grid; gap: 7px; }
    .simple-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-2);
    }
    .empty {
      padding: 13px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      color: var(--text-3);
      font-size: 12px;
    }
    .exception-item { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); }
    .exception-item.error   { border-color: rgba(185,28,28,.3);  background: var(--red-bg); }
    .exception-item.warning { border-color: rgba(146,64,14,.3);  background: var(--yellow-bg); }
    .exception-item.orange  { border-color: rgba(180,83,9,.3);   background: var(--orange-bg); }
    .exception-label   { font-size: 12px; font-weight: 900; color: var(--text); }
    .exception-detail  { margin-top: 5px; font-size: 12px; line-height: 1.7; color: var(--text-2); }
    .exception-preview { margin-top: 5px; font-size: 12px; line-height: 1.6; color: var(--text-3); }
    .exception-context { margin-top: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(29,78,216,.2); background: var(--blue-bg); font-size: 12px; font-weight: 700; color: var(--text-2); }
    details.exception-expand > summary { cursor: pointer; list-style: none; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; color: var(--blue); }
    details.exception-expand > summary::-webkit-details-marker { display: none }
    details.exception-expand .ex-full { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; line-height: 1.75; color: var(--text-2); }

    .compact-route { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); margin-bottom: 8px; }
    .compact-route .label { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
    .compact-route .value { margin-top: 3px; font-size: 12px; font-weight: 800; line-height: 1.5; }
    .compact-route .note  { margin-top: 3px; font-size: 11px; line-height: 1.6; color: var(--text-3); }

    .coverage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .coverage-card  { padding: 10px 12px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); }
    .coverage-label { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
    .coverage-value { margin-top: 5px; font-size: 16px; font-weight: 900; }

    .packet-card { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-2); margin-bottom: 10px; }
    .packet-top  { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .packet-title { font-size: 14px; font-weight: 900; }
    .packet-chip { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid var(--soft-border); background: var(--surface); color: var(--text-2); }
    .packet-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .mini-btn { appearance: none; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); padding: 7px 10px; font: inherit; font-size: 11px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; text-decoration: none; }
    .mini-btn:disabled { opacity: .4; cursor: not-allowed; }
    .packet-primary-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 10px; }
    .packet-primary-item .label { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
    .packet-primary-item { padding: 10px 12px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); }
    .packet-primary-item .value { margin-top: 4px; font-size: 12px; font-weight: 800; line-height: 1.65; }
    details.packet-secondary > summary { cursor: pointer; list-style: none; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; color: var(--text-3); padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin-top: 8px; }
    details.packet-secondary > summary::-webkit-details-marker { display: none }
    .packet-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 8px; }
    .packet-cell { padding: 9px 11px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); }
    .packet-cell .label { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
    .packet-cell .value { margin-top: 3px; font-size: 11px; line-height: 1.6; }
    .packet-coverage { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .coverage-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 9px; border-radius: 999px; border: 1px solid var(--soft-border); background: var(--surface); font-size: 11px; font-weight: 800; color: var(--text-2); }
    .coverage-pill.ready   { border-color: rgba(21,128,61,.3);  background: var(--green-bg);  color: var(--green); }
    .coverage-pill.partial { border-color: rgba(180,83,9,.3);   background: var(--orange-bg); color: var(--orange); }
    .coverage-pill.missing { border-color: rgba(185,28,28,.28); background: var(--red-bg);    color: var(--red); }
    .work-missing { margin-top: 8px; font-size: 12px; font-weight: 800; color: var(--yellow); }
    .inline-link  { display: inline-flex; align-items: center; margin-top: 6px; font-size: 11px; font-weight: 800; color: var(--blue); text-decoration: underline; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .data-table th, .data-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    .data-table th { font-size: 10px; font-weight: 800; color: var(--text-3); }
    .data-table tr:last-child td { border-bottom: none; }

    .kv-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .kv-card { padding: 10px 12px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); }
    .kv-card .label { font-size: 11px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); }
    .kv-card .value { margin-top: 5px; font-size: 12px; line-height: 1.65; }

    .hq-fresh.fresh { border-color: rgba(21,128,61,.35); color: var(--green); }

    @media (max-width: 580px) {
      .wc-grid, .wb-two-col, .wb-drawer-grid, .packet-primary-grid, .packet-grid, .kv-grid { grid-template-columns: 1fr; }
      .wb-action-text { font-size: 20px; }
      .wb-banner-meta { align-items: flex-start; }
      .wc-head, .packet-top { flex-wrap: wrap; }
      .wc-title, .packet-title { width: 100%; }
      .wc-stage, .packet-chip { align-self: flex-start; }
      .wc-cell.code-cell .wc-cell-value { font-size: 20px; }
      .coverage-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header class="hq-header">
    <h1><span class="dot">●</span> 発送</h1>
    <span class="hq-fresh" id="freshness-pill" title="最終更新時刻">—</span>
  </header>

  <div class="hq-wrap">

    <!-- A. Progress rail -->
    <div class="wb-rail">
      <div class="wb-steps" id="pipeline-strip"></div>
    </div>

    <!-- B. Action banner -->
    <div class="wb-banner">
      <div class="wb-eyebrow">いまやること</div>
      <div class="wb-action-text" id="summary-next-step">読み込み中</div>
      <div class="wb-banner-meta">
        <span class="wb-badge" id="summary-badge">読み込み中</span>
        <span class="wb-banner-route" id="summary-detail"></span>
      </div>
    </div>

    <!-- C. Focus card (primary single order) -->
    <div class="wb-focus">
      <div id="work-cards"></div>
    </div>

    <!-- D. Queue (remaining orders, compact rows) -->
    <div class="wb-queue" id="wb-queue" hidden>
      <div class="wb-queue-header">次の件</div>
      <div id="wb-queue-rows"></div>
    </div>

    <!-- E. Drawers -->
    <div class="wb-drawers">

      <!-- Stop reasons — shown only when there is content -->
      <details class="wb-drawer" id="stop-drawer">
        <summary id="stop-summary">⚠ 止める / 例外</summary>
        <div class="wb-drawer-body">
          <div class="wb-two-col">
            <div>
              <div class="wb-section-label">ここで止める</div>
              <div class="simple-list" id="stop-rules" style="margin-top:8px"></div>
            </div>
            <div>
              <div class="wb-section-label">あとでやること</div>
              <div id="exceptions-context"></div>
              <div id="exceptions" style="margin-top:6px"></div>
            </div>
          </div>
        </div>
      </details>

      <!-- Print + Route -->
      <details class="wb-drawer">
        <summary>印刷 / レール / エクスポート</summary>
        <div class="wb-drawer-body">
          <div class="wb-action-row" style="margin-top:6px">
            <button class="wb-btn-lg primary" id="open-print-view" type="button">印刷ビュー</button>
            <button class="wb-btn-lg" id="download-print-json" type="button">JSON保存</button>
            <details class="wb-fold">
              <summary>その他のエクスポート</summary>
              <div class="wb-fold-row">
                <button class="wb-btn-lg" id="download-print-csv" type="button">CSV保存</button>
                <button class="wb-btn-lg" id="download-batch-csv" type="button">バッチCSV保存</button>
                <button class="wb-btn-lg ghost" id="copy-print-json" type="button">JSONコピー</button>
              </div>
            </details>
          </div>
          <div class="coverage-grid" id="print-coverage" style="margin-top:12px"></div>
          <div id="print-note" style="margin-top:8px;font-size:12px;color:var(--text-3)"></div>
          <div class="wb-two-col" style="margin-top:14px">
            <div>
              <div class="wb-section-label">レール</div>
              <div id="route-list" style="margin-top:6px"></div>
            </div>
            <div>
              <div class="wb-section-label">印刷パケット</div>
              <div id="print-packets" style="margin-top:6px"></div>
            </div>
          </div>
          <div id="print-batch-panel" style="margin-top:12px">
            <div class="wb-section-label">集荷バッチ</div>
            <div id="print-batches" style="margin-top:6px"></div>
          </div>
        </div>
      </details>

      <!-- Backend + Supplemental -->

  <script src="./shipping_snapshot.js"></script>
  <script src="./common.js"></script>
  <script>
  (function(){
    var board = window.ZERO_COST_SHIPPING_BOARD || {};
    var consoleData = board.operator_console || {};
    var printExports = board.print_exports || {};
    var backendContract = board.backend_contract || {};
    var apiReadiness = board.api_readiness || {};
    var selectedBoxScope = window.zeroCostCurrentBoxScope ? window.zeroCostCurrentBoxScope() : '';
    var selectedBoxId = window.zeroCostCurrentBoxId ? window.zeroCostCurrentBoxId() : '';
    var selectedBoxLabel = window.zeroCostCurrentBoxLabel ? window.zeroCostCurrentBoxLabel() : selectedBoxId;

    /* ── utilities ── */
    function parseJstTimestamp(value){
      var text = String(value || '').trim();
      if (!text) return null;
      var normalized = text.replace(/ JST$/, '').replace(' ', 'T') + '+09:00';
      var parsed = new Date(normalized);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function esc(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function multilineHtml(v){ return esc(v).replace(/\n/g,'<br>'); }
    function attr(v){ return esc(v).replace(/\n/g,'&#10;'); }
    function set(id, value){ var el = document.getElementById(id); if (el) el.textContent = value; }
    function linkHtml(url, label){
      var href = String(url || '').trim();
      if (!href) return '';
      return '<a class="inline-link" href="'+esc(href)+'" target="_blank" rel="noreferrer noopener">'+esc(label||'開く')+'</a>';
    }
    function compactText(parts, sep){ return (parts||[]).filter(Boolean).join(sep||' '); }
    function downloadText(filename, text, mime){
      var blob = new Blob([text||''],{type:mime||'text/plain;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename||'download.txt';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }
    function copyText(text, button){
      if (!navigator.clipboard) return;
      navigator.clipboard.writeText(text||'').then(function(){
        if (!button) return;
        var orig = button.textContent;
        button.textContent = 'コピー済み';
        setTimeout(function(){ button.textContent = orig; }, 1200);
      });
    }
    function rowsToCsvText(rows){
      if (!rows||!rows.length) return '';
      var headers = Object.keys(rows[0]);
      function enc(v){ var t=String(v==null?'':v); return /[",\n]/.test(t)?'"'+t.replace(/"/g,'""')+'"':t; }
      var lines = [headers.map(enc).join(',')];
      rows.forEach(function(row){ lines.push(headers.map(function(h){ return enc(row[h]); }).join(',')); });
      return lines.join('\n')+'\n';
    }
    function renderList(id, items, className){
      var el = document.getElementById(id); if (!el) return;
      if (!items||!items.length){ el.innerHTML='<div class="empty">0件です。</div>'; return; }
      el.innerHTML = items.map(function(item){ return '<div class="'+(className||'simple-item')+'">'+esc(item)+'</div>'; }).join('');
    }
    function renderTable(id, rows){
      var box = document.getElementById(id); if (!box) return;
      if (!rows||!rows.length){ box.innerHTML='<div class="empty">まだありません。</div>'; return; }
      var headers = Object.keys(rows[0]);
      var head = '<tr>'+headers.map(function(h){ return '<th>'+esc(h)+'</th>'; }).join('')+'</tr>';
      var body = rows.map(function(row){ return '<tr>'+headers.map(function(h){ return '<td>'+esc(row[h]||'')+'</td>'; }).join('')+'</tr>'; }).join('');
      box.innerHTML='<table class="data-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
    }
    function firstNonEmpty(){
      for (var i=0;i<arguments.length;i++){ var v=arguments[i]; if (v==null) continue; var t=String(v).trim(); if (t) return t; }
      return '';
    }
    function numberValue(v){ return Number(v||0); }
    function scopeLabel(){
      if (selectedBoxId) return selectedBoxLabel || selectedBoxId;
      if (String(selectedBoxScope || '').toUpperCase() === 'ALL') return '全商品';
      return '全箱';
    }
    function scopeLabelWithId(){
      return selectedBoxId ? (scopeLabel() + ' / ' + selectedBoxId) : scopeLabel();
    }
    function boxFromText(value){
      var text = String(value || '').trim().toUpperCase();
      if (!text) return '';
      var match = text.match(/^(BOX-[A-Z0-9]+)-ITEM-/);
      if (match) return match[1];
      match = text.match(/\b(BOX-[A-Z0-9]+)\b/);
      return match ? match[1] : '';
    }
    function rowBoxId(row){
      if (!row || typeof row !== 'object') return '';
      var keys = ['product_id', '商品ID', '管理番号', 'id_label', 'shipment_id', 'order_id', 'title'];
      for (var i = 0; i < keys.length; i += 1) {
        if (Object.prototype.hasOwnProperty.call(row, keys[i])) {
          var preferred = boxFromText(row[keys[i]]);
          if (preferred) return preferred;
        }
      }
      var values = Object.keys(row).map(function(key){ return row[key]; });
      for (var j = 0; j < values.length; j += 1) {
        var derived = boxFromText(values[j]);
        if (derived) return derived;
      }
      return '';
    }
    function filterRowsBySelectedBox(rows){
      var source = Array.isArray(rows) ? rows : [];
      if (!selectedBoxId) return source.slice();
      return source.filter(function(row){
        return rowBoxId(row) === selectedBoxId;
      });
    }
    function summaryDetailText(detail){
      var prefix = selectedBoxId ? ('対象箱: ' + scopeLabelWithId()) : '';
      if (!prefix) return detail || '';
      return detail ? (prefix + ' ・ ' + detail) : prefix;
    }

    /* ── packet helpers ── */
    function packetLabelHref(p){ return String(p&&(p.label_pdf_url||p.label_download_url||'')||'').trim(); }
    function realLabelHref(p){ var h=packetLabelHref(p); return /example\.invalid/i.test(h)?'':h; }
    function packetCode(p){ return firstNonEmpty(p&&p.printable_code, p&&p.tracking_number, p&&p.reception_number, p&&p.reception_qr); }
    function packetPickup(p){ return compactText([p&&p.pickup_date, p&&p.pickup_window],' '); }
    function packetRecipient(p){
      var addr = compactText([p&&p.recipient_zip, p&&p.recipient_address],' ');
      return compactText([p&&p.recipient_name, addr, p&&p.recipient_phone],'\n');
    }
    function packetRecipientSingleLine(p){
      var addr = firstNonEmpty(p&&p.recipient_address, compactText([p&&p.recipient_zip, p&&p.recipient_address],' '));
      return compactText([p&&p.recipient_name, addr, p&&p.recipient_phone],' / ');
    }
    function packetTitle(p){ return firstNonEmpty(p&&p.product_name, p&&p.shipment_id, p&&p.order_id, '出荷カード'); }
    function packetReadyForHandoff(p){ return !!p && !!packetCode(p) && !!packetPickup(p) && !!packetRecipient(p) && !((p.missing_fields||[]).length); }

    function stageMode(stage, priority){
      if (stage==='引渡し可' || priority==='ready') return 'handoff';
      if (stage==='梱包待ち') return 'packing';
      if (stage==='要画面回収'||stage==='情報不足'||priority==='critical'||priority==='high') return 'label';
      return 'neutral';
    }

    /* ── data ── */
    var routes = consoleData.routes || [];
    var cards  = consoleData.work_cards || [];
    var samplePacket = (printExports.sample_shipment && Object.keys(printExports.sample_shipment).length) ? printExports.sample_shipment : null;
    var livePackets  = (printExports.shipments && printExports.shipments.length) ? printExports.shipments : [];
    var scopedCards = filterRowsBySelectedBox(cards);
    var scopedLivePackets = filterRowsBySelectedBox(livePackets);
    var scopedSamplePacket = samplePacket && (!selectedBoxId || rowBoxId(samplePacket) === selectedBoxId) ? samplePacket : null;
    var shipmentRows = filterRowsBySelectedBox(printExports.shipment_export_rows || []);
    var batchRows = filterRowsBySelectedBox(printExports.batch_export_rows || []);
    var shippedRecentRows = filterRowsBySelectedBox(((board.queue_preview||{}).shipped_recent) || []);

    function findPacketIndex(card, packets, used){
      if (!card) return -1;
      for (var i=0;i<packets.length;i++){
        if (used[i]) continue;
        var p=packets[i];
        if (card.order_id && p.order_id && card.order_id===p.order_id) return i;
        if (card.product_id && p.product_id && card.product_id===p.product_id) return i;
        if (card.id_label && p.shipment_id && card.id_label.indexOf(p.shipment_id)!==-1) return i;
      }
      return -1;
    }

    function buildUnifiedCard(card, packet, isSample, isIdle){
      var mode = isIdle ? 'idle' : stageMode(card&&card.stage, card&&card.priority);
      if (!card && !isIdle && packetReadyForHandoff(packet)) mode='handoff';
      if (!card && !isIdle && packet && !packetReadyForHandoff(packet)) mode='label';
      var defaultStage = isIdle?'待機中':(isSample?'見本':(mode==='handoff'?'引渡し可':(mode==='label'?'ラベル待ち':'梱包待ち')));
      var defaultPriority = isIdle?'medium':(mode==='handoff'?'ready':(mode==='label'?'high':'medium'));
      var defaultAction = isIdle
        ? '注文が入ると、梱包 → ラベル → 渡す の順でここに出ます。'
        : (isSample
          ? '売れたら本番カードが同じ形で出ます。'
          : (mode==='handoff'
            ? 'コードとラベルを持ってヤマトへ渡します。'
            : (mode==='label'
              ? 'ラベルと集荷情報がそろっているか確認します。'
              : '商品を取り、梱包します。')));
      return {
        mode: mode, isSample:!!isSample, isIdle:!!isIdle,
        stage: firstNonEmpty(card&&card.stage, defaultStage),
        priority: firstNonEmpty(card&&card.priority, defaultPriority),
        kindLabel: isIdle?'待機':firstNonEmpty(card&&card.kind, isSample?'見本':'出荷'),
        title: firstNonEmpty(card&&card.title, packetTitle(packet), isIdle?'まだ売れていません':'出荷カード'),
        action: firstNonEmpty(card&&card.action, defaultAction),
        idLabel: firstNonEmpty(card&&card.id_label, packet&&packet.shipment_id, ''),
        orderId: firstNonEmpty(card&&card.order_id, packet&&packet.order_id, ''),
        shipmentId: firstNonEmpty(packet&&packet.shipment_id, ''),
        route: firstNonEmpty(card&&card.route, packet&&packet.lane, (routes[0]||{}).value, ''),
        codeText: packetCode(packet),
        pickupText: packetPickup(packet),
        recipientText: packetRecipient(packet),
        recipientSingleLine: packetRecipientSingleLine(packet),
        labelHref: realLabelHref(packet),
        detailLabelHref: packetLabelHref(packet),
        labelStatus: firstNonEmpty(packet&&packet.label_status, isSample?'見本':''),
        boxId: firstNonEmpty(rowBoxId(card), rowBoxId(packet), ''),
        missingFields: (packet&&packet.missing_fields)||(card&&card.missing_fields)||[]
      };
    }

    function buildUnifiedCards(workCards, packets, sample){
      var used={};
      var items=(workCards||[]).map(function(card){
        var idx=findPacketIndex(card,packets,used);
        if (idx>=0) used[idx]=true;
        return buildUnifiedCard(card, idx>=0?packets[idx]:null, false, false);
      });
      (packets||[]).forEach(function(p,i){ if (used[i]) return; items.push(buildUnifiedCard(null,p,false,false)); });
      if (!items.length && sample) items.push(buildUnifiedCard(null,sample,true,false));
      if (!items.length) items.push(buildUnifiedCard(null,null,false,true));
      return items;
    }

    function missingForGroup(item, group){
      var text=(item.missingFields||[]).join(' ');
      if (!text) return false;
      if (group==='code')      return /送り状番号|受付番号|受付QR|見せるコード|提示方法/.test(text);
      if (group==='pickup')    return /引渡予定日|時間帯|集荷予定日/.test(text);
      if (group==='recipient') return /宛先|氏名|住所|電話/.test(text);
      if (group==='label')     return /ラベル/.test(text);
      return false;
    }

    /* ── focus card renderer ── */
    function renderFocusCardHtml(item){
      var codeMissing      = missingForGroup(item,'code')      || !item.codeText;
      var labelMissing     = missingForGroup(item,'label')     || (!item.labelHref && !item.isSample);
      var pickupMissing    = missingForGroup(item,'pickup')    || !item.pickupText;
      var recipientMissing = missingForGroup(item,'recipient') || !item.recipientText;

      var codeAction = item.codeText
        ? '<button class="wc-btn copy-inline" type="button" data-copy="'+attr(item.codeText)+'">コピー</button>'
        : '';
      var labelAction = item.labelHref
        ? '<a class="wc-btn primary" href="'+esc(item.labelHref)+'" target="_blank" rel="noreferrer noopener">ラベルを開く</a>'
        : (item.isSample ? '<button class="wc-btn open-print-inline" type="button">印刷ビュー</button>' : '');
      var recipientAction = item.recipientText
        ? '<button class="wc-btn copy-inline" type="button" data-copy="'+attr(item.recipientText)+'">コピー</button>'
        : '';

      var cardCls = 'wc';
      if (item.isSample) cardCls += ' wc-sample';
      if (item.isIdle)   cardCls += ' wc-idle';
      if (item.mode === 'handoff') cardCls += ' wc-handoff';

      var stageCls = 'wc-stage';
      if (item.priority==='ready')    stageCls += ' ready';
      else if (item.priority==='high')     stageCls += ' high';
      else if (item.priority==='critical') stageCls += ' critical';

      var codeValue   = item.codeText     ? multilineHtml(item.codeText)     : (codeMissing     ? '⚠ 未取得' : '未取得');
      var labelValue  = item.labelHref    ? '準備済み'                        : (item.isSample   ? '見本'    : (item.labelStatus || '未取得'));
      var pickupValue = item.pickupText   ? esc(item.pickupText)              : (pickupMissing   ? '⚠ 未取得' : '未取得');
      var recipValue  = item.recipientText ? multilineHtml(item.recipientText) : (recipientMissing ? '⚠ 未取得' : '未取得');

      var idParts = [];
      if (item.boxId)      idParts.push('箱 '+item.boxId);
      if (item.shipmentId) idParts.push('出荷 '+item.shipmentId);
      if (item.orderId)    idParts.push('注文 '+item.orderId);
      if (item.route)      idParts.push(item.route);

      return '<div class="'+cardCls+'">'
        +'<div class="wc-head">'
        +'<div class="wc-title">'+esc(item.title)+'</div>'
        +'<div class="'+stageCls+'">'+esc(item.stage)+'</div>'
        +'</div>'
        +(idParts.length?'<div class="wc-idbar">'+idParts.map(function(p){return '<span>'+esc(p)+'</span>';}).join('')+'</div>':'')
        +'<div class="wc-action">'+esc(item.action)+'</div>'
        +'<div class="wc-grid">'
        // Code cell
        +'<div class="wc-cell code-cell'+(codeMissing?' missing':'')+'">'
        +'<div class="wc-cell-label">見せるコード</div>'
        +'<div class="wc-cell-value">'+codeValue+'</div>'
        +(codeAction?'<div class="wc-cell-actions">'+codeAction+'</div>':'')
        +'</div>'
        // Label cell
        +'<div class="wc-cell'+(labelMissing?' missing':'')+'">'
        +'<div class="wc-cell-label">ラベル</div>'
        +'<div class="wc-cell-value">'+esc(labelValue)+'</div>'
        +(labelAction?'<div class="wc-cell-actions">'+labelAction+'</div>':'')
        +'</div>'
        // Pickup cell
        +'<div class="wc-cell'+(pickupMissing?' missing':'')+'">'
        +'<div class="wc-cell-label">集荷日時</div>'
        +'<div class="wc-cell-value">'+pickupValue+'</div>'
        +'</div>'
        // Recipient cell
        +'<div class="wc-cell'+(recipientMissing?' missing':'')+'">'
        +'<div class="wc-cell-label">宛先</div>'
        +'<div class="wc-cell-value">'+recipValue+'</div>'
        +(recipientAction?'<div class="wc-cell-actions">'+recipientAction+'</div>':'')
        +'</div>'
        +'</div>'
        +'</div>';
    }

    /* ── queue row renderer ── */
    function renderQueueRowHtml(item){
      var codeSnippet = item.codeText ? (item.codeText.length > 16 ? item.codeText.slice(0,16)+'…' : item.codeText) : '—';
      var pickup = item.pickupText || '—';
      var queueTitle = item.boxId ? (item.boxId + ' · ' + item.title) : item.title;
      return '<div class="wb-qrow">'
        +'<div class="wb-qrow-stage">'+esc(item.stage)+'</div>'
        +'<div class="wb-qrow-title">'+esc(queueTitle)+'</div>'
        +'<div class="wb-qrow-code">'+esc(codeSnippet)+'</div>'
        +'<div class="wb-qrow-pickup">'+esc(pickup)+'</div>'
        +'</div>';
    }

    /* ── freshness pill ── */
    (function(){
      var pill = document.getElementById('freshness-pill');
      if (!pill) return;
      var ts = board.generated_at || '';
      if (!ts){ pill.textContent='更新時刻不明'; return; }
      pill.textContent = '更新 '+ts;
      var parsed = parseJstTimestamp(ts);
      if (!parsed) return;
      var ageH = (Date.now()-parsed.getTime())/3600000;
      pill.classList.add(ageH>6?'stale':'fresh');
    })();

    /* ── mode ── */
    var metrics = board.metrics || {};
    (function(){
      var m = metrics;
      var isIdle = selectedBoxId
        ? !scopedCards.length && !scopedLivePackets.length && !scopedSamplePacket
        : (!m.orders_open && !m.packing_waiting && !m.pickup_waiting && !m.packed_waiting_pickup && !cards.length);
      document.body.dataset.mode = isIdle ? 'idle' : 'work';
    })();

    /* ── build unified cards ── */
    var unifiedCards = buildUnifiedCards(scopedCards, scopedLivePackets, scopedSamplePacket);
    var focusCard    = unifiedCards.find(function(c){ return !c.isSample && !c.isIdle; }) || unifiedCards[0];
    var queueItems   = unifiedCards.filter(function(c){ return c !== focusCard; });

    var apiSummary   = (apiReadiness.summary) || {};
    var liveWorkCards = unifiedCards.filter(function(c){ return !c.isSample && !c.isIdle; });
    var packingCount = selectedBoxId
      ? liveWorkCards.filter(function(c){ return c.mode==='packing'; }).length
      : Math.max(numberValue(metrics.packing_waiting), liveWorkCards.filter(function(c){ return c.mode==='packing'; }).length);
    var labelCount   = selectedBoxId
      ? liveWorkCards.filter(function(c){ return c.mode==='label'; }).length
      : Math.max(
          numberValue(metrics.packed_waiting_pickup)+numberValue(metrics.pickup_waiting),
          liveWorkCards.filter(function(c){ return c.mode==='label'; }).length
        );
    var handoffCount = unifiedCards.filter(function(c){ return c.mode==='handoff' && !c.isSample && !c.isIdle; }).length;
    var soldCount    = selectedBoxId
      ? Math.max(liveWorkCards.length, packingCount, labelCount, handoffCount)
      : Math.max(numberValue(metrics.orders_open), numberValue(metrics.shipping_candidates), packingCount, labelCount, handoffCount);
    var doneCount    = selectedBoxId ? shippedRecentRows.length : numberValue(metrics.shipped_total);

    /* ── summary state ── */
    var summaryBadge    = '待機中';
    var summaryHeadline = '売れたらここにカードが出ます。';
    var summaryDetail   = summaryDetailText((routes[0]||{}).value || '');
    var summaryNext     = '今は待つだけです。';
    var currentStepId   = 'idle';
    var badgeMod        = '';

    if (apiSummary.mainline_blockers) {
      summaryBadge='要確認'; badgeMod='critical';
      summaryNext='下の「止める / 例外」ドロワーを先に確認します。';
      currentStepId = handoffCount?'handoff':(labelCount?'label':(packingCount||soldCount?'pack':'sold'));
    } else if (focusCard && focusCard.isSample) {
      summaryBadge='見本'; badgeMod='sample';
      summaryNext=(selectedBoxId ? (scopeLabel() + ' の見本で ') : '') + 'コード・宛先・ラベル位置を確認します。';
    } else if (focusCard && focusCard.isIdle) {
      summaryBadge='待機中';
      summaryNext=(selectedBoxId ? (scopeLabel() + ' の注文が入ると、') : '注文が入ると、') + '梱包カードが先頭に出ます。';
    } else if (handoffCount) {
      summaryBadge='引渡し可'; badgeMod='ready'; currentStepId='handoff';
      summaryNext = focusCard && focusCard.action ? focusCard.action : 'コードとラベルを持ってヤマトへ渡します。';
      summaryDetail = focusCard ? summaryDetailText('先頭: '+focusCard.title) : summaryDetail;
    } else if (labelCount) {
      summaryBadge='ラベル準備'; badgeMod='active'; currentStepId='label';

            +'<div><strong>受付番号</strong><br>'+esc(packet.reception_number||'')+'</div>'
            +'<div><strong>引渡予定日</strong><br>'+esc(packet.pickup_date||'')+'</div>'
            +'<div><strong>時間帯</strong><br>'+esc(packet.pickup_window||'')+'</div>'
            +'<div><strong>提示方法</strong><br>'+esc(packet.display_method||'')+'</div>'
            +'<div><strong>見せるコード</strong><br>'+esc(packet.printable_code||'')+'</div>'
            +'<div><strong>宛先氏名</strong><br>'+esc(packet.recipient_name||'')+'</div>'
            +'<div><strong>宛先住所</strong><br>'+esc(ra||'')+'</div>'
            +'<div><strong>宛先電話番号</strong><br>'+esc(packet.recipient_phone||'')+'</div>'
            +'<div><strong>ラベル</strong><br>'+esc(packet.label_status||'')+(ll?'<br>'+esc(ll):'')+'</div>'
            +'<div><strong>発送元</strong><br>'+esc(st||'')+'</div>'
            +'<div><strong>印刷メモ</strong><br>'+esc(packet.print_note||'')+'</div>'
            +'</div>'
            +'<p>不足: '+esc((packet.missing_fields||[]).join(' / ')||'なし')+'</p>'
            +'<p>メモ: '+esc(packet.note||'')+'</p></section>';
        }).join('') : '<p>出力対象はまだありません。</p>')
        +'<h2>集荷バッチ</h2>'+batchHtml
        +'</body></html>';
    }

    var jsonBtn    = document.getElementById('download-print-json');
    var shipBtn    = document.getElementById('download-print-csv');
    var batchBtn   = document.getElementById('download-batch-csv');
    var printBtn   = document.getElementById('open-print-view');
    var copyBtn    = document.getElementById('copy-print-json');

    if (jsonBtn){ jsonBtn.disabled=!hasJson; jsonBtn.addEventListener('click',function(){ downloadText(filenames.json||('shipping_print_packets'+filenameSuffix+'.json'),jsonPayloadText,'application/json;charset=utf-8'); }); }
    if (shipBtn){ shipBtn.disabled=!hasShipmentCsv; shipBtn.addEventListener('click',function(){ downloadText(filenames.shipment_csv||('shipping_print_packets'+filenameSuffix+'.csv'),shipmentCsvText,'text/csv;charset=utf-8'); }); }
    if (batchBtn){ batchBtn.disabled=!hasBatchCsv; batchBtn.addEventListener('click',function(){ downloadText(filenames.batch_csv||('shipping_pickup_batches'+filenameSuffix+'.csv'),batchCsvText,'text/csv;charset=utf-8'); }); }
    if (copyBtn){ copyBtn.disabled=!hasJson; copyBtn.addEventListener('click',function(){ copyText(jsonPayloadText,copyBtn); }); }
    if (printBtn){
      printBtn.disabled=!hasPrintTarget;
      printBtn.addEventListener('click',function(){
        var w=window.open('','_blank','noopener,noreferrer');
        if (!w) return;
        w.document.open(); w.document.write(printableHtml()); w.document.close();
        w.focus(); setTimeout(function(){ w.print(); },250);
      });
    }
  })();
  </script>
</body>
</html>
